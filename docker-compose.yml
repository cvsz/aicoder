services:
  zaicoder:
    build: .
    image: zaicoder:latest
    container_name: zaicoder
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:?ANTHROPIC_API_KEY must be set in the environment or .env file}
      - ZCODER_LOG_FORMAT=json
      - ZCODER_LOG_LEVEL=INFO
    volumes:
      # Persist config/cache across container restarts without baking
      # secrets or state into the image.
      - zaicoder-home:/home/zaicoder
    healthcheck:
      test: ["CMD", "python", "main.py", "--health-check"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    restart: unless-stopped
    # Interactive CLI usage: docker compose run --rm zaicoder -p "..."
    stdin_open: true
    tty: true

volumes:
  zaicoder-home:
